
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CHO HRI Reporting Tool</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f26720">

  <style>
    /* Reset margins and ensure seamless full screen */
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100dvh; /* Dynamic viewport height fixes iOS/Android browser bar issues */
      background-color: #f0f2f5;
      overflow: hidden; /* We want the scroll to happen inside the iframe, not outside */
    }
    
    /* Full screen iframe */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }
    
    /* Loading Placeholder Animation */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: -apple-system, sans-serif;
      color: #666;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }
    
    #loader::after {
      content: "";
      width: 30px;
      height: 30px;
      border: 4px solid #ddd;
      border-top: 4px solid #f26720;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loader">Loading App...</div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbw0thPz8_xiAaugXxQ0UmCSVZmNIdo9X-MkJ7Pbxttlxu1ZlTwSPIffGZgG_Gb20nSR/exec" 
    id="appFrame"
    onload="document.getElementById('loader').style.display='none';"
    allow="geolocation; microphone; camera">
  </iframe>

<button id="installBtn" style="display:none; position:absolute; bottom:80px; right:20px; z-index:9999; padding:12px 24px; background:#f26720; color:white; border:none; border-radius:30px; cursor:pointer; font-weight:bold; box-shadow:0 6px 16px rgba(242, 103, 32, 0.4);">
  📲 Install App
</button>

<script>
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });

  installBtn.addEventListener('click', (e) => {
    installBtn.style.display = 'none';
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      deferredPrompt = null;
    });
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
</html>
